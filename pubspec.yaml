name: sistema_financeiro
description: App de controle de gastos com Flutter
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI e Design
  cupertino_icons: ^1.0.2
  flutter_svg: ^2.0.7
  
  # Estado
  provider: ^6.0.0
  
  # Banco de dados
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # Datas
  intl: ^0.19.0
  
  # Gráficos
  fl_chart: ^0.64.0
  
  # API (para sincronização em nuvem futura)
  http: ^1.1.0
  
  # Persistência
  shared_preferences: ^2.2.2
  uuid: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  
  flutter_lints: ^3.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.6

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
  
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600